{{/*
Chart-managed SeaweedFS S3 IAM credentials Secret.

Used by:
  - the bundled seaweedfs sub-chart (when deploy=true) via `s3.allInOne.s3.existingConfigSecret`
    that points at this Secret in the parent values.yaml. SeaweedFS reads the
    `seaweedfs_s3_config` JSON key.
  - the Langfuse helper `langfuse.s3Env` (LANGFUSE_S3_*_ACCESS_KEY_ID / *_SECRET_ACCESS_KEY) —
    the helper points env vars at this Secret's `accessKey` / `secretKey` keys.

Keys written:
  accessKey            — S3 access key ID Langfuse uses
  secretKey            — S3 secret access key Langfuse uses (auto-generated if blank)
  seaweedfs_s3_config  — JSON IAM config consumed by the SeaweedFS allInOne pod

Skipped when the user supplies their own `s3.auth.existingSecret`.
*/}}
{{- if and .Values.s3.deploy (not .Values.s3.auth.existingSecret) -}}
{{- $name := printf "%s-s3-auth" (include "langfuse.fullname" .) -}}
{{- $rootUser := required "s3.auth.rootUser is required when s3.deploy=true" .Values.s3.auth.rootUser -}}
{{- $rootPassword := .Values.s3.auth.rootPassword -}}
{{- if not $rootPassword -}}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
  {{- if and $existing (index $existing.data "secretKey") -}}
    {{- $rootPassword = index $existing.data "secretKey" | b64dec -}}
  {{- else -}}
    {{- $rootPassword = randAlphaNum 40 -}}
  {{- end -}}
{{- end -}}
{{- $iamConfig := dict "identities" (list (dict
    "name" $rootUser
    "credentials" (list (dict "accessKey" $rootUser "secretKey" $rootPassword))
    "actions" (list "Admin" "Read" "Write" "List" "Tagging")
  )) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
type: Opaque
data:
  accessKey: {{ $rootUser | b64enc | quote }}
  secretKey: {{ $rootPassword | b64enc | quote }}
  seaweedfs_s3_config: {{ $iamConfig | toJson | b64enc | quote }}
{{- end }}
