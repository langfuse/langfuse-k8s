{{/*
Chart-managed PostgreSQL credential Secret.

Used by:
  - the bundled groundhog2k/postgres sub-chart (when deploy=true) via
    `userDatabase.existingSecret` and `settings.existingSecret` defaults that
    point at this Secret in the parent values.yaml
  - the Langfuse helper `langfuse.databaseEnv` (DATABASE_PASSWORD env var) via
    `postgresql.auth.existingSecret` default

Keys written:
  POSTGRES_USER, POSTGRES_PASSWORD          — superuser (groundhog2k)
  POSTGRES_DB, USERDB_USER, USERDB_PASSWORD — userDatabase (groundhog2k)
  postgres-direct-url                       — Langfuse DIRECT_URL (optional)
  postgres-shadow-database-url              — Langfuse SHADOW_DATABASE_URL (optional)

Skipped when the user supplies their own `postgresql.auth.existingSecret`.
*/}}
{{- if and .Values.postgresql.deploy (not .Values.postgresql.auth.existingSecret) -}}
{{- $name := printf "%s-postgresql-auth" (include "langfuse.fullname" .) -}}
{{- $password := .Values.postgresql.auth.password -}}
{{- if not $password -}}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
  {{- if and $existing (index $existing.data "POSTGRES_PASSWORD") -}}
    {{- $password = index $existing.data "POSTGRES_PASSWORD" | b64dec -}}
  {{- else -}}
    {{- $password = randAlphaNum 40 -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_USER: {{ "postgres" | b64enc | quote }}
  POSTGRES_PASSWORD: {{ $password | b64enc | quote }}
  POSTGRES_DB: {{ required "postgresql.auth.database is required when deploy=true" .Values.postgresql.auth.database | toString | b64enc | quote }}
  USERDB_USER: {{ required "postgresql.auth.username is required when deploy=true" .Values.postgresql.auth.username | toString | b64enc | quote }}
  USERDB_PASSWORD: {{ $password | b64enc | quote }}
  {{- if .Values.postgresql.directUrl }}
  postgres-direct-url: {{ .Values.postgresql.directUrl | toString | b64enc | quote }}
  {{- end }}
  {{- if .Values.postgresql.shadowDatabaseUrl }}
  postgres-shadow-database-url: {{ .Values.postgresql.shadowDatabaseUrl | toString | b64enc | quote }}
  {{- end }}
{{- end }}
{{- if and (not .Values.postgresql.deploy) (.Values.postgresql.auth.password) -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "langfuse.fullname" . }}-postgresql
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
type: Opaque
data:
  postgres-password: {{ .Values.postgresql.auth.password | toString | b64enc | quote }}
  {{- if .Values.postgresql.directUrl }}
  postgres-direct-url: {{ .Values.postgresql.directUrl | toString | b64enc | quote }}
  {{- end }}
  {{- if .Values.postgresql.shadowDatabaseUrl }}
  postgres-shadow-database-url: {{ .Values.postgresql.shadowDatabaseUrl | toString | b64enc | quote }}
  {{- end }}
{{- end }}
