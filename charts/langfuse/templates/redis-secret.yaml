{{/*
Chart-managed Valkey/Redis credential Secret.

Used by:
  - the bundled valkey-io/valkey sub-chart (when deploy=true) via
    `redis.auth.usersExistingSecret` default in the parent values.yaml. Valkey
    reads `<username>` keys from this Secret (one per ACL user) and hashes them
    into the `aclfile`.
  - the Langfuse helper `langfuse.redisEnv` (REDIS_PASSWORD env var) — the helper
    points the env var at this Secret's `<username>` key.

Keys written:
  <auth.username>      — password for the ACL user Langfuse authenticates as
                         (key name == username, matching valkey-helm's default
                         passwordKey resolution).

Skipped when the user supplies their own `redis.auth.existingSecret`.
*/}}
{{- if and .Values.redis.deploy (not .Values.redis.auth.existingSecret) -}}
{{- $name := printf "%s-redis-auth" (include "langfuse.fullname" .) -}}
{{- $username := required "redis.auth.username is required when redis.deploy=true" .Values.redis.auth.username -}}
{{- $password := .Values.redis.auth.password -}}
{{- if not $password -}}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
  {{- if and $existing (index $existing.data $username) -}}
    {{- $password = index $existing.data $username | b64dec -}}
  {{- else -}}
    {{- $password = randAlphaNum 40 -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
type: Opaque
data:
  {{ $username }}: {{ $password | b64enc | quote }}
{{- end }}
