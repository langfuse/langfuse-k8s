# Langfuse Helm Chart Configuration

# -- Override the name for the selector labels, defaults to the chart name
nameOverride: ""

# -- Override the full name of the deployed resources, defaults to a combination of the release name and the name for the selector labels
fullnameOverride: ""

# Core Langfuse Configuration
langfuse:
  # Logging configuration
  logging:
    # -- Set the log level for the application (trace, debug, info, warn, error, fatal)
    level: info
    # -- Set the log format for the application (text or json)
    format: text

  # -- Used to hash API keys. Can be configured by value or existing secret reference. To generate a new salt, run `openssl rand -base64 32`.
  salt:
    value: ""
    secretKeyRef:
      name: ""
      key: ""

  # -- Langfuse EE license key.
  licenseKey:
    value: ""
    secretKeyRef:
      name: ""
      key: ""

  # -- EE: Langfuse allowed organization creators. See [documentation](https://langfuse.com/self-hosting/organization-creators)
  allowedOrganizationCreators: []

  # -- Authentication and SSO settings:
  # -- If you want to disable username/password login, set auth.disableUsernamePassword to true.
  # -- Refer to [documentation](https://langfuse.com/self-hosting/authentication-and-sso) for available keys for each provider.
  # -- For each provider, add it to auth.providers, and add respective configuration options under it.
  # -- For options, use the last part (after provider name) of the respective environment variable's name, in camelCase.
  # -- Values can be specified directly as strings, or as secret references using secretKeyRef.
  # -- For example, to use Azure AD as your SSO provider, use the following lines:
  # auth:
  #   disableUsernamePassword: true
  #   providers:
  #     azureAd:
  #       clientId: "<YOUR CLIENT ID>"
  #       clientSecret:
  #         secretKeyRef:
  #           name: "my-sso-secret"
  #           key: "azure-client-secret"
  #       tenantId: "<YOUR TENANT ID>"
  # -- For sensitive fields, it is recommended to use secretKeyRef to avoid storing secrets in values.yaml

  # -- Used to encrypt sensitive data. Must be 256 bits (64 string characters in hex format). Generate via `openssl rand -hex 32`.
  encryptionKey:
    value: ""
    secretKeyRef:
      name: ""
      key: ""

  # Feature flags
  features:
    # -- Whether or not to report basic usage statistics to a centralized server.
    telemetryEnabled: true
    # -- Disable public sign up
    signUpDisabled: false
    # -- Enable experimental features
    experimentalFeaturesEnabled: false

  # -- Node.js environment to use for all langfuse deployments
  nodeEnv: production

  serviceAccount:
    # -- Whether to create a service account for all langfuse deployments
    create: true
    # -- Annotations for the service account
    annotations: {}
    # -- Override the name of the service account to use, discovered automatically if not set
    name: ""
    # -- Whether to automount service account token in pods. Set to false to disable automatic mounting of the service account token.
    automountServiceAccountToken: true

  smtp:
    # -- SMTP connection URL. See [documentation](https://langfuse.com/self-hosting/transactional-emails)
    connectionUrl: ""
    # -- From address for emails. Required if connectionUrl is set.
    fromAddress: ""

  ingress:
    # -- Set to `true` to enable the ingress resource
    enabled: false
    # -- Additional labels for the ingress resource
    additionalLabels: {}
    # -- Annotations for the ingress resource
    annotations: {}
    # -- The class name for the ingress resource
    className: ""
    # -- The hosts for the ingress resource
    hosts: []
    # Example:
    # - host: "langfuse.example.com"
    #   paths:
    #     - path: /
    #       pathType: ImplementationSpecific

    tls:
      # -- Set to `true` to enable use HTTPS on the ingress
      enabled: false
      # -- The name of the secret to use for TLS Key
      secretName: ""

  # -- Pod security context for all langfuse deployments
  podSecurityContext: {}
  # -- Security context for all langfuse deployments
  securityContext: {}
  # -- Node selector for all langfuse deployments
  nodeSelector: {}
  # -- Tolerations for all langfuse deployments
  tolerations: []
  # -- Affinity for all langfuse deployments
  affinity: {}
  # -- DNS configuration for all langfuse deployments
  dnsConfig: {}
  pod:
    # -- Annotations for all langfuse pods
    annotations: {}
    # -- Labels for all langfuse pods
    labels: {}
    # -- Topology spread constraints for all langfuse pods
    topologySpreadConstraints: []
  deployment:
    # -- Annotations for all langfuse deployments
    annotations: {}
    # -- Deployment strategy for all langfuse deployments (can be overridden by individual deployments)
    strategy: {}
  # -- Number of replicas to use for all langfuse deployments. Can be overridden by the individual deployments
  replicas: 1
  # -- Number of old ReplicaSets to retain to allow rollback. Can be overridden by the individual deployments
  revisionHistoryLimit: 10
  # -- Resources for all langfuse deployments. Can be overridden by the individual deployments
  resources: {}
  image:
    # -- The image tag to use for all langfuse deployments. Can be overridden by the individual deployments. Falls back to appVersion if not set.
    tag: Null
    # -- The pull policy to use for all langfuse deployments. Can be overridden by the individual deployments.
    pullPolicy: Always
    # -- The pull secrets to use for all langfuse deployments. Can be overridden by the individual deployments.
    pullSecrets: []

  # -- List of additional environment variables to be added to all langfuse deployments. See [documentation](https://langfuse.com/docs/deployment/self-host#configuring-environment-variables) for details.
  additionalEnv: []
  # -- Secrets or ConfigMap of additional environment variables to be added to all langfuse deployments. See [documentation](https://langfuse.com/docs/deployment/self-host#configuring-environment-variables) for details.
  additionalEnvFrom: []
  # -- Allows additional containers to be added to all langfuse deployments
  extraContainers: []
  # -- Allows additional volumes to be added to all langfuse deployments
  extraVolumes: []
  # -- Allows additional init containers to be added to all langfuse deployments
  extraInitContainers: []
  # -- Allows additional volume mounts to be added to all langfuse deployments
  extraVolumeMounts: []

  # -- Allows additional lifecycle hooks to be added to all langfuse deployments
  extraLifecycle: {}

  # Web deployment configuration
  web:
    image:
      # -- The image repository to use for the langfuse web pods.
      repository: langfuse/langfuse
      # -- The tag to use for the langfuse web pods. Using `langfuse.image.tag` if not set.
      tag: Null
      # -- The pull policy to use for the langfuse web pods. Using `langfuse.image.pullPolicy` if not set.
      pullPolicy: Null
      # -- The pull secrets to use for the langfuse web pods. Using `langfuse.image.pullSecrets` if not set.
      pullSecrets: Null
    deployment:
      # -- Additional labels for the langfuse web deployment
      additionalLabels: {}
      # -- Annotations for the web deployment
      annotations: {}
      # -- Deployment strategy for the web deployment. Overrides the global deployment strategy
      strategy: {}
    pod:
      # -- Annotations for the web pods
      annotations: {}
      # -- Labels for the web pods
      labels: {}
      # -- Node selector for the web pods. Overrides the global nodeSelector
      nodeSelector: null
      # -- Tolerations for the web pods. Overrides the global tolerations
      tolerations: null
      # -- Affinity for the web pods. Overrides the global affinity
      affinity: null
      # -- Topology spread constraints for the web pods. Overrides the global topologySpreadConstraints
      topologySpreadConstraints: null
      # -- Allows additional containers to be added to all langfuse web pods
      extraContainers: []
      # -- List of additional environment variables to be added to all langfuse web pods. See [documentation](https://langfuse.com/docs/deployment/self-host#configuring-environment-variables) for details.
      additionalEnv: []
      # -- Secrets or ConfigMap of additional environment variables to be added to all langfuse web pods. See [documentation](https://langfuse.com/docs/deployment/self-host#configuring-environment-variables) for details.
      additionalEnvFrom: []
    service:
      # -- The type of service to use for the langfuse web application
      type: ClusterIP
      # -- The port to use for the langfuse web application
      port: 3000
      # -- The external port that will be exposed by the service. Falls back to `port` if not set.
      externalPort: null
      # -- The node port to use for the langfuse web application
      nodePort: null
      # -- Additional labels for the langfuse web application service
      additionalLabels: {}
      # -- Annotations for the langfuse web application service
      annotations: {}

    # -- Resources for the langfuse web pods. Defaults to the global resources
    resources: {}

    # -- Number of replicas to use if HPA is not enabled. Defaults to the global replicas
    replicas: null

    # -- Number of old ReplicaSets to retain to allow rollback.
    revisionHistoryLimit: null

    # KEDA ScaledObject configuration
    keda:
      # -- Set to `true` to enable KEDA for the langfuse web pods
      # Note: When both KEDA and HPA are enabled, the deployment will fail.
      enabled: false
      # -- The minimum number of replicas to use for the langfuse web pods
      minReplicas: 1
      # -- The maximum number of replicas to use for the langfuse web pods
      maxReplicas: 2
      # -- The polling interval in seconds for checking metrics
      pollingInterval: 30
      # -- The trigger type for scaling (cpu or memory)
      triggerType: "cpu"
      # -- The metric type for scaling (Utilization or AverageValue)
      metricType: "Utilization"
      # -- The target utilization percentage for the langfuse web pods
      value: "50"
      # -- Optional container name to target for metrics (leave empty to target all containers)
      containerName: ""

    # Horizontal Pod Autoscaler configuration
    hpa:
      # -- Set to `true` to enable HPA for the langfuse web pods
      # Note: When both KEDA and HPA are enabled, the deployment will fail.
      enabled: false
      # -- The minimum number of replicas to use for the langfuse web pods
      minReplicas: 1
      # -- The maximum number of replicas to use for the langfuse web pods
      maxReplicas: 2
      # -- The target CPU utilization percentage for the langfuse web pods
      targetCPUUtilizationPercentage: 50

    # Vertical Pod Autoscaler configuration
    vpa:
      # -- Set to `true` to enable VPA for the langfuse web pods
      enabled: false
      # -- The resources to control for the langfuse web pods
      controlledResources: []
      # -- The maximum allowed resources for the langfuse web pods
      maxAllowed: {}
      # -- The minimum allowed resources for the langfuse web pods
      minAllowed: {}
      updatePolicy:
        # -- The update policy mode for the langfuse web pods
        updateMode: Auto

    # -- Adding records to /etc/hosts in the pod's network.
    hostAliases: []

    livenessProbe:
      # -- Path to check for liveness.
      path: "/api/public/health"
      # -- Initial delay seconds for livenessProbe.
      initialDelaySeconds: 20
      # -- Period seconds for livenessProbe.
      periodSeconds: 10
      # -- Timeout seconds for livenessProbe.
      timeoutSeconds: 5
      # -- Failure threshold for livenessProbe.
      failureThreshold: 3
      # -- Success threshold for livenessProbe.
      successThreshold: 1

    readinessProbe:
      # -- Path to check for readiness.
      path: "/api/public/ready"
      # -- Initial delay seconds for readinessProbe.
      initialDelaySeconds: 20
      # -- Period seconds for readinessProbe.
      periodSeconds: 10
      # -- Timeout seconds for readinessProbe.
      timeoutSeconds: 5
      # -- Failure threshold for readinessProbe.
      failureThreshold: 3
      # -- Success threshold for readinessProbe.
      successThreshold: 1

    # Pod Disruption Budget configuration for the web deployment
    pdb:
      # -- Set to `true` to create a Pod Disruption Budget for the langfuse web pods
      create: true
      # -- Minimum number of available pods during disruptions. Cannot be set simultaneously with maxUnavailable.
      minAvailable: ""
      # -- Maximum number of unavailable pods during disruptions. Cannot be set simultaneously with minAvailable. Defaults to 1 if neither is set.
      maxUnavailable: ""

  # Worker deployment configuration
  worker:
    image:
      # -- The image repository to use for the langfuse worker pods
      repository: langfuse/langfuse-worker
      # -- The tag to use for the langfuse worker pods. Using `langfuse.image.tag` if not set.
      tag: Null
      # -- The pull policy to use for the langfuse worker pods. Using `langfuse.image.pullPolicy` if not set.
      pullPolicy: Null
      # -- The pull secrets to use for the langfuse worker pods. Using `langfuse.image.pullSecrets` if not set.
      pullSecrets: Null
    deployment:
      # -- Additional labels for the worker deployment
      additionalLabels: {}
      # -- Annotations for the worker deployment
      annotations: {}
      # -- Deployment strategy for the worker deployment. Overrides the global deployment strategy
      strategy: {}
    pod:
      # -- Annotations for the worker pods
      annotations: {}
      # -- Labels for the worker pods
      labels: {}
      # -- Node selector for the worker pods. Overrides the global nodeSelector
      nodeSelector: null
      # -- Tolerations for the worker pods. Overrides the global tolerations
      tolerations: null
      # -- Affinity for the worker pods. Overrides the global affinity
      affinity: null
      # -- Topology spread constraints for the worker pods. Overrides the global topologySpreadConstraints
      topologySpreadConstraints: null
      # -- Allows additional containers to be added to all langfuse worker pods
      extraContainers: []
      # -- List of additional environment variables to be added to all langfuse worker pods. See [documentation](https://langfuse.com/docs/deployment/self-host#configuring-environment-variables) for details.
      additionalEnv: []
      # -- Secrets or ConfigMap of additional environment variables to be added to all langfuse worker pods. See [documentation](https://langfuse.com/docs/deployment/self-host#configuring-environment-variables) for details.
      additionalEnvFrom: []
    # -- Resources for the langfuse worker pods. Defaults to the global resources
    resources: {}

    # -- Number of replicas to use if HPA is not enabled. Defaults to the global replicas
    replicas: null

    # -- Number of old ReplicaSets to retain to allow rollback.
    revisionHistoryLimit: null

    # KEDA ScaledObject configuration
    keda:
      # -- Set to `true` to enable KEDA for the langfuse worker pods
      # Note: When both KEDA and HPA are enabled, the deployment will fail.
      enabled: false
      # -- The minimum number of replicas to use for the langfuse worker pods
      minReplicas: 1
      # -- The maximum number of replicas to use for the langfuse worker pods
      maxReplicas: 2
      # -- The polling interval in seconds for checking metrics
      pollingInterval: 30
      # -- The trigger type for scaling (cpu or memory)
      triggerType: "cpu"
      # -- The metric type for scaling (Utilization or AverageValue)
      metricType: "Utilization"
      # -- The target utilization percentage for the langfuse worker pods
      value: "50"
      # -- Optional container name to target for metrics (leave empty to target all containers)
      containerName: ""

    # Horizontal Pod Autoscaler configuration
    hpa:
      # -- Set to `true` to enable HPA for the langfuse worker pods
      # Note: When both KEDA and HPA are enabled, the deployment will fail.
      enabled: false
      # -- The minimum number of replicas to use for the langfuse worker pods
      minReplicas: 1
      # -- The maximum number of replicas to use for the langfuse worker pods
      maxReplicas: 2
      # -- The target CPU utilization percentage for the langfuse worker pods
      targetCPUUtilizationPercentage: 50

    # Vertical Pod Autoscaler configuration
    vpa:
      # -- Set to `true` to enable VPA for the langfuse worker pods
      enabled: false
      # -- The resources to control for the langfuse worker pods
      controlledResources: []
      # -- The maximum allowed resources for the langfuse worker pods
      maxAllowed: {}
      # -- The minimum allowed resources for the langfuse worker pods
      minAllowed: {}
      updatePolicy:
        # -- The update policy mode for the langfuse worker pods
        updateMode: Auto

    # Pod Disruption Budget configuration for the worker deployment
    pdb:
      # -- Set to `true` to create a Pod Disruption Budget for the worker deployment
      create: true
      # -- Minimum number of available pods during disruptions. Cannot be set simultaneously with maxUnavailable.
      minAvailable: ""
      # -- Maximum number of unavailable pods during disruptions. Cannot be set simultaneously with minAvailable. Defaults to 1 if neither is set.
      maxUnavailable: ""

    livenessProbe:
      # -- Initial delay seconds for livenessProbe.
      initialDelaySeconds: 20
      # -- Period seconds for livenessProbe.
      periodSeconds: 10
      # -- Timeout seconds for livenessProbe.
      timeoutSeconds: 5
      # -- Failure threshold for livenessProbe.
      failureThreshold: 3
      # -- Success threshold for livenessProbe.
      successThreshold: 1

  # NextAuth configuration
  nextauth:
    # -- When deploying to production, set the `nextauth.url` value to the canonical URL of your site.
    url: http://localhost:3000
    # -- Used to encrypt the NextAuth.js JWT, and to hash email verification tokens. Can be configured by value or existing secret reference.
    secret:
      value: ""
      secretKeyRef:
        name: ""
        key: ""

# PostgreSQL Configuration
# -- Deploys a single-instance PostgreSQL via the groundhog2k/postgres sub-chart (image `docker.io/postgres`).
# -- For HA / managed Postgres, set `postgresql.deploy: false` and configure `host` + auth fields below.
postgresql:
  # -- Enable PostgreSQL deployment via the bundled groundhog2k/postgres sub-chart.
  # -- Set to false to use an external (managed) Postgres server.
  deploy: true

  # -- PostgreSQL host to connect to. If postgresql.deploy is true, this will be set automatically based on the release name.
  host: ""
  # -- Port of the postgres server to use. Defaults to 5432.
  port: null
  # -- Additional database connection arguments
  args: ""

  # -- If `postgresql.deploy` is set to false, Connection string of your Postgres database used for database migrations. Use this if you want to use a different user for migrations or use connection pooling on DATABASE_URL. For large deployments, configure the database user with long timeouts as migrations might need a while to complete.
  directUrl: ""

  # -- If your database user lacks the CREATE DATABASE permission, you must create a shadow database and configure the "SHADOW_DATABASE_URL". This is often the case if you use a Cloud database. Refer to the Prisma docs for detailed instructions.
  shadowDatabaseUrl: ""

  # Authentication configuration (Langfuse-facing — these values are read by the chart's helpers
  # to build DATABASE_USERNAME / DATABASE_PASSWORD / DATABASE_NAME for the langfuse pods).
  auth:
    # -- Username Langfuse uses to connect to PostgreSQL. When `postgresql.deploy: true`, the
    # -- groundhog2k sub-chart creates this user automatically (see `userDatabase` below).
    username: langfuse
    # -- Password Langfuse uses to connect to PostgreSQL. When `postgresql.deploy: true`,
    # -- this password is propagated to the sub-chart via this chart's auto-generated Secret.
    # -- Leave empty to have the chart generate one and store it in a release-managed Secret.
    password: ""
    # -- If you want to use an existing secret for the postgres password, set the name of the secret here. (`postgresql.auth.password` will be ignored and picked up from this secret).
    existingSecret: ""
    # -- The keys in the existing secret that contain the passwords.
    # -- `userPasswordKey` is the password used by Langfuse; `adminPasswordKey` is only required
    # -- when `postgresql.deploy: true` (used as the Postgres superuser password by the sub-chart).
    secretKeys:
      userPasswordKey: password
      adminPasswordKey: postgres-password
    # -- Database name to use for Langfuse. When `postgresql.deploy: true`, the sub-chart creates this
    # -- database automatically and grants ownership to `auth.username`.
    database: langfuse
    # -- Additional database connection arguments
    args: ""

  # Migration configuration
  migration:
    # -- Whether to run automatic migrations on startup
    autoMigrate: true

  # ---------------------------------------------------------------------------
  # Sub-chart settings (groundhog2k/postgres)
  # Anything under this section is passed straight through to the sub-chart.
  # See https://artifacthub.io/packages/helm/groundhog2k/postgres for the full schema.
  # ---------------------------------------------------------------------------
  image:
    # -- Postgres image. Defaults to the upstream Docker Hub image (Apache 2.0 / PostgreSQL license).
    repository: postgres
    tag: "18-alpine"
    pullPolicy: IfNotPresent

  # -- Number of replicas for the Postgres StatefulSet. Single-instance only — set to 0 to suspend.
  replicaCount: 1

  service:
    type: ClusterIP
    # -- Port the Postgres Service exposes. Must match `postgresql.port` (or the langfuse default 5432).
    port: 5432

  # -- PVC settings for the Postgres data volume.
  storage:
    # Size of the data PVC. Adjust based on expected trace + project volume.
    requestedSize: 20Gi
    # -- StorageClass name. Leave empty to use the cluster's default.
    className: ""
    # -- Keep the PVC after the release is uninstalled.
    persistentVolumeClaimRetentionPolicy:
      whenDeleted: Retain
      whenScaled: Retain

  # -- Postgres server settings consumed by the groundhog2k chart. The chart's helpers wire
  # -- the chart-managed Secret into these fields automatically when `auth.password` is set
  # -- (or `existingSecret` is provided), so users typically don't edit `settings` directly.
  settings:
    # -- Postgres superuser password (for the built-in `postgres` role). Auto-derived from the
    # -- chart-managed Secret unless `existingSecret` is supplied.
    superuserPassword: {}
    # -- Reference an existing Secret holding the superuser password. Defaults to the
    # -- chart-managed Secret (`<release>-postgresql-auth`) — assumes fullname "langfuse".
    # -- Override (or set `fullnameOverride: langfuse`) if your release name differs.
    # -- Required keys: POSTGRES_USER, POSTGRES_PASSWORD.
    existingSecret: "langfuse-postgresql-auth"

  # -- Bootstrap a Langfuse-owned database + user on first start.
  # -- The `name`, `user`, and `password` fields are maps in groundhog2k's schema (each is
  # -- `{ secretKey: ..., value: ... }`). When `existingSecret` is set (the default below),
  # -- groundhog2k reads the value from that Secret using the field's `secretKey`, falling
  # -- back to a default key matching the env var name (`POSTGRES_DB`, `USERDB_USER`,
  # -- `USERDB_PASSWORD`). The chart-managed Secret writes those exact keys, so empty maps
  # -- here just opt into the defaults. The actual database name + user are governed by
  # -- `auth.database` and `auth.username` above (those values populate the Secret).
  userDatabase:
    name: {}
    user: {}
    password: {}
    # -- Reference an existing Secret holding the userDatabase credentials. Defaults to the
    # -- chart-managed Secret (`<release>-postgresql-auth`) — assumes fullname "langfuse".
    # -- Override (or set `fullnameOverride: langfuse`) if your release name differs.
    # -- Required keys: USERDB_USER, USERDB_PASSWORD, POSTGRES_DB.
    existingSecret: "langfuse-postgresql-auth"

  # -- Resource limits/requests for the Postgres pod. Tune for your workload.
  resources: {}
    # limits:
    #   cpu: 2000m
    #   memory: 2Gi
    # requests:
    #   cpu: 500m
    #   memory: 512Mi

  # -- Node selector / tolerations / affinity for the Postgres pod.
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # -- Pod security context.
  podSecurityContext:
    fsGroup: 999
  # -- Container security context.
  securityContext:
    runAsUser: 999
    runAsGroup: 999

  # -- Liveness / readiness probe customisations (see groundhog2k/postgres docs).
  livenessProbe: {}
  readinessProbe: {}
  startupProbe: {}

# Key-Value Store / Redis Configuration
# -- Deploys Valkey via the official valkey-io/valkey sub-chart (image `docker.io/valkey/valkey`).
# -- For HA, point Langfuse at an external Redis/Valkey cluster (e.g. an in-cluster Redis operator
# -- or a managed service such as ElastiCache).
redis:
  # -- Enable Valkey deployment via the bundled valkey-io/valkey sub-chart.
  # -- Set to false to use an existing Redis or Valkey deployment.
  deploy: true

  # -- Redis host to connect to. If redis.deploy is true, this will be set automatically based on the release name.
  host: ""
  # -- Redis port to connect to.
  port: 6379

  # Redis TLS configuration
  tls:
    # -- Set to `true` to enable TLS/SSL encrypted connection to the Redis server.
    # -- When `redis.deploy: true`, this also enables TLS termination on the Valkey sub-chart.
    enabled: false
    # -- Path to the CA certificate file for TLS verification (mounted into Langfuse pods).
    caPath: ""
    # -- Path to the client certificate file for mutual TLS authentication.
    certPath: ""
    # -- Path to the client private key file for mutual TLS authentication.
    keyPath: ""

  # Authentication configuration. This block is dual-purpose:
  #   1. Langfuse-facing — `username`, `password`, `existingSecret`, `existingSecretPasswordKey`,
  #      `database` are consumed by the chart helpers to build REDIS_PASSWORD and the connection
  #      string for the langfuse pods.
  #   2. Sub-chart pass-through — `enabled`, `usersExistingSecret`, `aclUsers`, `aclConfig` are
  #      consumed by the bundled valkey-io/valkey sub-chart (when `redis.deploy: true`). The
  #      defaults below enable ACL auth, point Valkey at the chart-managed Secret
  #      (`<release>-redis-auth`, generated by templates/redis-secret.yaml), and grant the
  #      `default` user full permissions for the Langfuse application.
  auth:
    # -- Enable ACL-based authentication on the bundled Valkey sub-chart.
    enabled: true
    # -- Username for Redis authentication. Set to null to omit username from connection string entirely.
    # -- When `redis.deploy: true`, an ACL user with this name is created automatically.
    username: "default"
    # -- Password for Redis authentication. Set to null to disable authentication.
    # -- Use URL-encoded passwords or avoid special characters.
    # -- When `redis.deploy: true`, this password is wired into the Valkey sub-chart's ACL config
    # -- via the chart-managed Secret `<release>-redis-auth`. Leave empty to have the chart
    # -- generate one (idempotent across upgrades via lookup).
    password: ""
    # -- If you want to use an existing secret for the redis password, set the name of the secret
    # -- here. When set, `redis.auth.password` is ignored and the chart-managed Secret is not
    # -- created. The Langfuse helper reads the password from this Secret using
    # -- `existingSecretPasswordKey`.
    existingSecret: ""
    # -- The key in the existing secret that contains the password.
    existingSecretPasswordKey: ""

    database: 0

    # -- Pass-through to valkey-helm: Secret containing one key per ACL user (key name == username).
    # -- The default value assumes the release name resolves to fullname "langfuse" — set
    # -- `fullnameOverride: langfuse` if your release name differs, or override here.
    usersExistingSecret: "langfuse-redis-auth"
    # -- Pass-through to valkey-helm: ACL users to create. Must include "default" when
    # -- `enabled: true` (otherwise valkey rejects the config). `~* &* +@all` grants full access.
    aclUsers:
      default:
        permissions: "~* &* +@all"
    # -- Pass-through to valkey-helm: extra inline ACL config appended after `aclUsers`.
    aclConfig: ""

  # Redis Cluster configuration
  cluster:
    # -- Set to `true` to enable Redis Cluster mode. When enabled, you must set `redis.deploy` to `false` and provide cluster nodes.
    enabled: false
    # -- List of Redis cluster nodes in the format "host:port". Example: ["redis-1:6379", "redis-2:6379", "redis-3:6379"]
    nodes: []

  # Redis Sentinel configuration
  sentinel:
    # -- Set to `true` to enable Redis Sentinel mode. Cannot be enabled simultaneously with cluster mode. When enabled, you must set `redis.deploy` to `false`.
    enabled: false
    # -- Name of the Redis Sentinel master. Required when `redis.sentinel.enabled` is `true`.
    masterName: ""
    # -- Comma-separated list of Redis Sentinel nodes in the format "host:port". Example: "sentinel-1:26379,sentinel-2:26379,sentinel-3:26379". Required when `redis.sentinel.enabled` is `true`.
    nodes: ""
    # -- Username for Redis Sentinel authentication (optional).
    username: ""
    # -- Password for Redis Sentinel authentication (optional).
    password: ""
    # -- If you want to use an existing secret for the sentinel password, set the name of the secret here. (`redis.sentinel.password` will be ignored and picked up from this secret).
    existingSecret: ""
    # -- The key in the existing secret that contains the sentinel password.
    existingSecretPasswordKey: ""

  # ---------------------------------------------------------------------------
  # Sub-chart settings (valkey-io/valkey)
  # Anything under this section is passed straight through to the sub-chart.
  # See https://github.com/valkey-io/valkey-helm for the full schema.
  # ---------------------------------------------------------------------------
  image:
    registry: docker.io
    repository: valkey/valkey
    tag: "8.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    # -- Port the primary Valkey Service exposes.
    port: 6379

  # -- Replication configuration. Default: standalone (no replicas). Set `enabled: true` and bump
  # -- `replicas` for a primary/replica topology — the Langfuse helpers always target the primary.
  replica:
    enabled: false
    replicas: 0
    persistence:
      size: 8Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce
    service:
      enabled: true
      type: ClusterIP
      port: 6379

  # -- Persistence for the primary node.
  dataStorage:
    enabled: true
    requestedSize: 8Gi
    className: ""
    accessModes:
      - ReadWriteOnce
    keepPvc: false

  # -- Set the maxmemory eviction policy. Langfuse requires `noeviction` to avoid losing job data.
  extraFlags:
    - "--maxmemory-policy"
    - "noeviction"

  # -- Resource limits/requests for the Valkey pods.
  resources: {}

  podSecurityContext:
    fsGroup: 1000
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  metrics:
    # -- Enable the bundled Valkey Prometheus exporter sidecar.
    enabled: false

# ClickHouse Configuration
# -- Deploys ClickHouse via the upstream ClickHouse/clickhouse-operator (apiVersion
# -- `clickhouse.com/v1alpha1`). The operator is alpha-quality at the time of writing — review
# -- release notes before upgrading and pin the operator chart version explicitly.
clickhouse:
  # -- Enable a `ClickHouseCluster` + `KeeperCluster` rendered by this chart.
  # -- Set to false to use an external ClickHouse server.
  deploy: true

  # -- ClickHouse host to connect to. If clickhouse.deploy is true, this will be set automatically
  # -- based on the cluster CR's headless Service.
  host: ""
  # -- ClickHouse HTTP port to connect to.
  httpPort: 8123
  # -- ClickHouse native (TCP) port to connect to.
  nativePort: 9000
  # -- ClickHouse database to use.
  database: default

  # Authentication configuration (Langfuse-facing — these values are read by the chart's helpers
  # to build CLICKHOUSE_USER / CLICKHOUSE_PASSWORD for the langfuse pods).
  auth:
    # -- Username for the ClickHouse user.
    username: default
    # -- Password for the ClickHouse user. When `clickhouse.deploy: true`, the chart creates a
    # -- ClickHouse Secret holding the SHA256 hash and references it from the cluster CR.
    # -- Leave empty to have the chart generate one.
    password: ""
    # -- If you want to use an existing secret for the ClickHouse password, set the name of the secret here. (`clickhouse.auth.password` will be ignored and picked up from this secret).
    existingSecret: ""
    # -- The key in the existing secret that contains the password.
    existingSecretKey: ""

  # Migration configuration
  migration:
    # -- Migration URL (TCP protocol) for clickhouse
    url: ""
    # -- Set to true to establish SSL connection for migration
    ssl: false
    # -- Whether to run automatic ClickHouse migrations on startup
    autoMigrate: true

  # -- Whether to run ClickHouse commands ON CLUSTER. Controls CLICKHOUSE_CLUSTER_ENABLED setting.
  # -- When `clickhouse.deploy: true` AND `cluster.replicas: 1`, this is ignored and forced to false.
  clusterEnabled: true

  # ---------------------------------------------------------------------------
  # Sub-chart settings (rendered as ClickHouseCluster + KeeperCluster CRs by this chart)
  # ---------------------------------------------------------------------------
  cluster:
    # -- Number of ClickHouse replicas. Set to 1 for a non-HA single-pod cluster (the default
    # -- automatically forces `CLICKHOUSE_CLUSTER_ENABLED=false`). 2+ requires Keeper enabled.
    replicas: 1
    image:
      repository: clickhouse/clickhouse-server
      tag: "24.8"
    storage:
      # -- Size of each ClickHouse pod's data PVC.
      size: 100Gi
      # -- StorageClass name. Leave empty to use the cluster's default.
      className: ""
      accessModes:
        - ReadWriteOnce
    # -- Resource limits/requests for the ClickHouse pods.
    resources: {}
      # limits:
      #   cpu: 4
      #   memory: 8Gi
      # requests:
      #   cpu: 1
      #   memory: 2Gi
    # -- Pod scheduling.
    nodeSelector: {}
    tolerations: []
    affinity: {}
    # -- Extra ClickHouse server settings (under `<clickhouse>` config XML).
    settings: {}
    # -- Extra ClickHouse profile settings (mounted into `users.xml`).
    profileSettings: {}

  keeper:
    # -- Deploy a `KeeperCluster` CR alongside the ClickHouseCluster. Required for replicated mode.
    enabled: true
    # -- Keeper replica count. Must be odd (1, 3, 5). Use 3 for production.
    replicas: 3
    image:
      repository: clickhouse/clickhouse-keeper
      tag: "24.8"
    storage:
      size: 10Gi
      className: ""
      accessModes:
        - ReadWriteOnce
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}

# ClickHouse Operator (Upstream `ClickHouse/clickhouse-operator` v0.0.4 — alpha)
# -- The operator's admission webhook requires cert-manager. cert-manager is bundled inside the
# -- operator's sub-chart and gated on `certManager.install` below.
clickhouseOperator:
  # -- Install the upstream ClickHouse operator chart. Disable if your cluster already has it.
  # -- The operator is cluster-scoped — only ONE instance should run per cluster.
  deploy: true

  # ---------------------------------------------------------------------------
  # Sub-chart settings (clickhouse-operator-helm v0.0.4)
  # ---------------------------------------------------------------------------
  manager:
    replicas: 1
    image:
      repository: ghcr.io/clickhouse/clickhouse-operator
      pullPolicy: IfNotPresent
    resources: {}
  crd:
    # -- Install the operator CRDs.
    enable: true
    # -- Keep CRDs on `helm uninstall`. Recommended to avoid losing CRs accidentally.
    keep: true
  certManager:
    # -- Tell the operator to use cert-manager for its admission webhook.
    enable: true
    # -- Have this chart install cert-manager as a sub-sub-chart. Set to false if cert-manager
    # -- is already installed in the cluster.
    install: true
  webhook:
    enable: true
  metrics:
    enable: true
  pdbManagement:
    enable: true

# S3 / Object Storage Configuration
# -- Deploys SeaweedFS in `allInOne` mode (single pod combining master/volume/filer/S3 gateway)
# -- via the official seaweedfs/seaweedfs sub-chart. Image: `chrislusf/seaweedfs` (Apache 2.0).
# -- For production, point Langfuse at S3 / Azure Blob / GCS instead by setting `s3.deploy: false`.
s3:
  # -- Enable SeaweedFS deployment via the bundled seaweedfs sub-chart.
  # -- Set to false to use an external S3-compatible BlobStorage (S3 / GCS / Azure Blob / etc.).
  deploy: true

  # -- Storage provider to use. Options: s3 (default), azure, gcs
  # -- When set to 'azure', enables Azure Blob Storage native integration
  # -- When set to 'gcs', enables Google Cloud Storage native integration
  # -- When set to 's3', uses S3-compatible interface (default behavior)
  storageProvider: "s3"

  # -- S3 bucket to use for all uploads. Can be overridden per upload type.
  # -- When `s3.deploy: true`, this bucket is auto-created on the SeaweedFS S3 gateway.
  bucket: "langfuse"
  # -- S3 region to use for all uploads. Can be overridden per upload type.
  region: "auto"
  # -- S3 endpoint to use for all uploads. Can be overridden per upload type.
  # -- When `s3.deploy: true`, this is set automatically to the SeaweedFS allInOne S3 Service.
  endpoint: ""
  # -- Whether to force path style on requests. Required for SeaweedFS / MinIO. Can be overridden per upload type.
  forcePathStyle: true
  # -- S3 accessKeyId to use for all uploads. Can be overridden per upload type.
  accessKeyId:
    value: ""
    secretKeyRef:
      name: ""
      key: ""
  # -- S3 secretAccessKey to use for all uploads. Can be overridden per upload type.
  secretAccessKey:
    value: ""
    secretKeyRef:
      name: ""
      key: ""

  # Google Cloud Storage Configuration (only used when storageProvider is 'gcs')
  gcs:
    # -- Google Cloud Storage credentials JSON or path to credentials file
    # -- Can be the JSON content directly or a path to the credentials file
    # -- If not provided, will fallback to environment credentials (e.g., service account attached to pods)
    # -- Example: Set value to the JSON service account key content, or use secretKeyRef to reference a secret
    credentials:
      value: ""
      secretKeyRef:
        name: ""
        key: ""

  # S3 Concurrency Configuration
  concurrency:
    # -- Maximum number of concurrent read operations to S3. Defaults to 50.
    reads: 50
    # -- Maximum number of concurrent write operations to S3. Defaults to 50.
    writes: 50

  # Event Upload Configuration
  eventUpload:
    # -- S3 bucket to use for event uploads.
    bucket: ""
    # -- Prefix to use for event uploads within the bucket.
    prefix: ""
    # -- S3 region to use for event uploads.
    region: ""
    # -- S3 endpoint to use for event uploads.
    endpoint: ""
    # -- Whether to force path style on requests. Required for SeaweedFS / MinIO.
    forcePathStyle: Null
    # -- S3 accessKeyId to use for event uploads.
    accessKeyId:
      value: ""
      secretKeyRef:
        name: ""
        key: ""
    # -- S3 secretAccessKey to use for event uploads.
    secretAccessKey:
      value: ""
      secretKeyRef:
        name: ""
        key: ""

  # Batch Export Configuration
  batchExport:
    # -- Enable batch export.
    enabled: true
    # -- S3 bucket to use for batch exports.
    bucket: ""
    # -- Prefix to use for batch exports within the bucket.
    prefix: ""
    # -- S3 region to use for batch exports.
    region: ""
    # -- S3 endpoint to use for batch exports.
    endpoint: ""
    # -- Whether to force path style on requests. Required for SeaweedFS / MinIO.
    forcePathStyle: Null
    # -- S3 accessKeyId to use for batch exports.
    accessKeyId:
      value: ""
      secretKeyRef:
        name: ""
        key: ""
    # -- S3 secretAccessKey to use for batch exports.
    secretAccessKey:
      value: ""
      secretKeyRef:
        name: ""
        key: ""

  # Media Upload Configuration
  mediaUpload:
    # -- Enable media uploads.
    enabled: true
    # -- S3 bucket to use for media uploads.
    bucket: ""
    # -- Prefix to use for media uploads within the bucket.
    prefix: ""
    # -- S3 region to use for media uploads.
    region: ""
    # -- S3 endpoint to use for media uploads.
    endpoint: ""
    # -- Whether to force path style on requests. Required for SeaweedFS / MinIO.
    forcePathStyle: Null
    # -- S3 accessKeyId to use for media uploads.
    accessKeyId:
      value: ""
      secretKeyRef:
        name: ""
        key: ""
    # -- S3 secretAccessKey to use for media uploads.
    secretAccessKey:
      value: ""
      secretKeyRef:
        name: ""
        key: ""
    # -- Maximum content length for media uploads. Defaults to 1GB.
    maxContentLength: 1000000000
    # -- Expiry time for download URLs. Defaults to 1 hour.
    downloadUrlExpirySeconds: 3600

  # Authentication for the bundled SeaweedFS S3 gateway. The chart wires these credentials
  # into both Langfuse (as LANGFUSE_S3_*_ACCESS_KEY_ID / *_SECRET_ACCESS_KEY) and into a
  # generated SeaweedFS IAM config Secret consumed by the allInOne pod.
  auth:
    # -- Access key ID Langfuse uses to authenticate against the SeaweedFS S3 gateway.
    rootUser: "langfuse"
    # -- Secret access key Langfuse uses to authenticate against the SeaweedFS S3 gateway.
    # -- Leave empty to have the chart generate one.
    rootPassword: ""
    # -- Reference an existing Secret holding the access/secret key. The keys are read using
    # -- `rootUserSecretKey` (default: access-key) and `rootPasswordSecretKey` (default: secret-key).
    existingSecret: ""
    # -- Key in the existing secret that contains the S3 access key ID.
    rootUserSecretKey: ""
    # -- Key in the existing secret that contains the S3 secret access key.
    rootPasswordSecretKey: ""

  # -- Default bucket name list for legacy compatibility. The first entry is used as fallback
  # -- when neither `s3.bucket` nor a per-upload `bucket` is set.
  defaultBuckets: "langfuse"

  # ---------------------------------------------------------------------------
  # Sub-chart settings (seaweedfs/seaweedfs)
  # In `allInOne` mode, the dedicated master/volume/filer/s3 components are disabled and
  # replaced by a single combined pod.
  # ---------------------------------------------------------------------------
  master:
    enabled: false
  volume:
    enabled: false
  filer:
    enabled: false
  s3:
    enabled: false

  allInOne:
    enabled: true
    image:
      registry: docker.io
      repository: chrislusf/seaweedfs
      tag: "3.95"
      pullPolicy: IfNotPresent
    s3:
      enabled: true
      port: 8333
      enableAuth: true
      # -- Reference a chart-managed Secret containing the SeaweedFS IAM config JSON.
      # -- The chart auto-generates this Secret (`<release>-s3-auth`) from
      # -- `s3.auth.rootUser` / `rootPassword` when `s3.deploy: true`. The default value
      # -- assumes the release name resolves to fullname "langfuse" — set
      # -- `fullnameOverride: langfuse` if your release name differs, or override here.
      existingConfigSecret: "langfuse-s3-auth"
      # -- Buckets to create on first start. The chart appends `s3.bucket` automatically.
      createBuckets:
        - name: langfuse
      createBucketsHook:
        resources: {}
    data:
      # -- Persistence for the SeaweedFS data directory.
      type: persistentVolumeClaim
      size: 50Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce
    service:
      type: ClusterIP
      internalTrafficPolicy: Cluster
    resources:
      limits:
        cpu: 2
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi
    nodeSelector: {}
    tolerations: []
    affinity: {}

# Additional manifests
extraManifests: []
