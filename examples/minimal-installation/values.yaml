# Minimal Langfuse v2 installation. The bundled sub-charts auto-provision their
# own credentials Secrets — only the three Langfuse application secrets need to
# be supplied. Apply secret.yaml first, then `helm install`.
langfuse:
  salt:
    secretKeyRef:
      name: langfuse
      key: salt

  encryptionKey:
    secretKeyRef:
      name: langfuse
      key: encryption-key

  nextauth:
    secret:
      secretKeyRef:
        name: langfuse
        key: nextauth-secret

# Postgres / ClickHouse / Valkey / SeaweedFS credentials are generated by the
# chart on first install and persisted across upgrades via lookup. To override,
# set `<component>.auth.password` (or `<component>.auth.existingSecret`).
postgresql:
  deploy: true

clickhouse:
  deploy: true
  operator:
    deploy: true

redis:
  deploy: true

s3:
  deploy: true
