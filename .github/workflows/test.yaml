name: Unit Tests
on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Run Helm Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read # Read repository contents for checkout.
      checks: write # Publish unit test check results.
      pull-requests: write # Comment with unit test results on pull requests.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.13.2

      - name: Install helm-unittest plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest.git --version v1.0.0

      - name: Update dependencies
        run: helm dependency update charts/langfuse/

      - name: Run unit tests
        run: |
          helm unittest charts/langfuse/ --color --output-type JUnit --output-file test-results.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: always()
        with:
          files: test-results.xml
          check_name: "Helm Unit Test Results"
          comment_title: "Helm Unit Test Results"
