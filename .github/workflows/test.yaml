name: Unit Tests
on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Run Helm Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read # Read repository contents for checkout.
      checks: write # Publish unit test check results.
      pull-requests: write # Comment with unit test results on pull requests.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.13.2

      - name: Install helm-unittest plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest.git --version v1.0.0

      - name: Update dependencies
        run: helm dependency update charts/langfuse/

      - name: Run unit tests
        run: |
          helm unittest charts/langfuse/ --color --output-type JUnit --output-file test-results.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        if: always()
        with:
          files: test-results.xml
          check_name: "Helm Unit Test Results"
          comment_title: "Helm Unit Test Results"
